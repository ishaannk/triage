    provider: nvidia
    role: small
    provider_model: "meta/llama-3.1-8b-instruct"
    default_small: true         # <- router auto-pick: fast, free, returns logprobs
    escalate_to: gpt-4o         # hard/risky tasks go to the paid strong model
    alt:
      groq: "llama-3.1-8b-instant"
    mmlu: 69.4
