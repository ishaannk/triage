  # ================== OpenRouter (opt-in lane, self-hosters) =================
  # `:free` models are ~50 requests/DAY and often 429 upstream — fine for
  # personal use, never the public-demo default. They self-hide in the UI when
  # no `openrouter=` key is set. IDs verified live 2026-07-15.
  - id: nemotron-ultra-550b-free
    label: "Nemotron 3 Ultra 550B (OpenRouter, free)"
