# =========================================================================
# Triage model registry.
# `role: small` = everyday-task lane (shown in the "small tasks" picker);
# `role: big`   = heavy-task lane (shown in the "hard tasks" picker).
# `provider_model` is the id the provider's API expects. `cost_in`/`cost_out`
# are USD per 1M tokens — open-source lanes are $0 (you pay the provider
# nothing on free tiers); OpenAI rows carry exact public list prices.
# `default_small` marks the router's auto-pick. Any model that fails on its
# provider falls back to the built-in mock, so the app never hard-fails.
# To add a model: copy a block, set provider/provider_model/role. That's it.
# =========================================================================

models:
  - id: gpt-4o-mini
    label: "GPT-4o mini (OpenAI)"
    family: gpt
    size_b: 0            # closed weights; size unknown
    provider: openai
    role: small
    provider_model: "gpt-4o-mini"
    mmlu: 82.0
    gpqa: 40.2
    cost_in: 0.15
    cost_out: 0.60
    context: 128000
    escalate_to: gpt-4o

  - id: gpt-4o
    label: "GPT-4o (OpenAI)"
    family: gpt
    size_b: 0
    provider: openai
    role: big
    provider_model: "gpt-4o"
    mmlu: 88.7
    gpqa: 53.6
    cost_in: 2.50
    cost_out: 10.00
    context: 128000

  # Modern pair — flip the escalation target / default_small to these if preferred.
  - id: gpt-5-mini
    label: "GPT-5 mini (OpenAI)"
    family: gpt
    size_b: 0
    provider: openai
    role: small
    provider_model: "gpt-5-mini"
    mmlu: 85.0
    gpqa: 55.0
    cost_in: 0.25
    cost_out: 2.00
    context: 400000
    escalate_to: gpt-5

  - id: gpt-5
    label: "GPT-5 (OpenAI)"
    family: gpt
    size_b: 0
    provider: openai
    role: big
    provider_model: "gpt-5"
    mmlu: 91.0
    gpqa: 72.0
    cost_in: 1.25
    cost_out: 10.00
